<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mya's Meal Planner 🐾</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0f1720;color:#e8dcc8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
.header{background:#0a1018;padding:14px 20px 0;border-bottom:1px solid rgba(200,147,58,0.25);position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.app-title{font-size:19px;font-weight:700;color:#c8933a;}
.pet-name-input{display:block;width:100%;background:transparent;border:none;border-bottom:1px solid rgba(200,147,58,0.3);color:#c8933a;font-size:13px;font-weight:600;padding:3px 0 5px;margin-bottom:4px;}
.pet-name-input::placeholder{color:#666;opacity:0.7;}
.app-sub{font-size:10px;color:#666;margin-bottom:10px;}
.tabs{display:flex;}
.tab{flex:1;padding:9px 2px;font-size:11px;font-weight:600;color:#666;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.2px;}
.tab.active{color:#c8933a;border-bottom-color:#c8933a;}
.page{padding:14px;padding-bottom:80px;display:none;}
.page.active{display:block;}
/* Plan tab */
.section-title{font-size:13px;font-weight:700;color:#c8933a;margin-bottom:10px;margin-top:4px;}
.aafco-group{margin-bottom:14px;}
.aafco-group-label{font-size:10px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.aafco-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.aafco-cell{background:#1a2535;border-radius:7px;padding:7px 9px;}
.aafco-cell-name{font-size:10px;color:#888;margin-bottom:2px;}
.aafco-cell-val{font-size:12px;font-weight:700;color:#e8dcc8;}
/* Rotation */
.rotation-week{background:#1a2535;border-radius:12px;padding:12px;margin-bottom:10px;}
.rotation-week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.rotation-week-title{font-size:13px;font-weight:700;color:#e8dcc8;}
.fish-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;background:rgba(33,150,243,0.2);color:#64b5f6;}
.rotation-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;}
.day-cell{flex-shrink:0;width:44px;border-radius:8px;padding:6px 4px;text-align:center;}
.day-cell.land{background:#0f1a28;}
.day-cell.fish{background:rgba(33,150,243,0.15);border:1px solid rgba(100,181,246,0.3);}
.day-cell-name{font-size:9px;font-weight:700;color:#888;margin-bottom:4px;}
.day-cell-am{font-size:9px;color:#e8dcc8;line-height:1.3;margin-bottom:2px;}
.day-cell-pm{font-size:9px;color:#888;line-height:1.3;}
.fish-icon{font-size:11px;}
/* Calendar */
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:#1a2535;border-radius:12px;padding:11px 14px;}
.nav-btn{background:rgba(200,147,58,0.15);border:1px solid rgba(200,147,58,0.3);color:#c8933a;border-radius:8px;padding:7px 16px;font-size:20px;cursor:pointer;line-height:1;}
.date-center{text-align:center;}
.date-main{font-size:15px;font-weight:700;}
.date-sub{font-size:10px;color:#888;margin-top:2px;}
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.meal-card{background:#1a2535;border:1px solid rgba(200,147,58,0.2);border-radius:12px;padding:11px;}
.meal-card.fed{background:#1a2f1a;border-color:rgba(76,175,80,0.4);}
.slot-label{font-size:9px;font-weight:700;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.meal-protein{font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.3;display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.meal-details{font-size:10px;color:#888;line-height:1.6;}
.oz-tag{font-size:11px;color:#666;font-weight:400;}
.amt-tag{cursor:pointer;border-bottom:1px dotted #c8933a;color:#c8933a;padding-bottom:1px;}
.recipe-list{margin-top:4px;}
.recipe-line{font-size:10px;color:#999;line-height:1.7;display:flex;justify-content:space-between;}
.recipe-line.supp{color:#777;font-style:italic;}
.supp-check-row{display:flex;align-items:flex-start;gap:7px;font-size:10px;color:#999;font-style:italic;line-height:1.5;padding:3px 0;cursor:pointer;}
.supp-check-row input{margin-top:1px;width:13px;height:13px;accent-color:#c8933a;flex-shrink:0;cursor:pointer;}
.recipe-divider{height:1px;background:rgba(255,255,255,0.06);margin:6px 0;}
.addl-box{background:#1a2535;border:1px solid rgba(200,147,58,0.2);border-radius:12px;padding:13px;margin-top:10px;}
.addl-title{font-size:11px;font-weight:700;color:#c8933a;letter-spacing:.3px;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.step-num{flex-shrink:0;width:16px;height:16px;border-radius:50%;background:#c8933a;color:#0f1720;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;}
.addl-title .step-num{background:#c8933a;color:#0f1720;}
.addl-list{margin-bottom:8px;}
.addl-item{font-size:11px;color:#e8dcc8;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.addl-empty{font-size:11px;color:#555;margin-bottom:8px;}
.addins-btn{width:100%;margin-top:7px;padding:6px 0;background:transparent;border:1px solid rgba(200,147,58,0.35);color:#c8933a;border-radius:7px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.swap-note{font-size:9px;color:#ff9800;margin-bottom:4px;font-style:italic;}
.swap-option{padding:12px 14px;background:#0f1720;border-radius:8px;margin-bottom:6px;font-size:13px;color:#e8dcc8;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.swap-option.active{border:1px solid #c8933a;background:rgba(200,147,58,0.1);color:#c8933a;font-weight:700;}
.swap-sched-tag{font-size:9px;color:#666;font-weight:400;}
.fed-btn{width:100%;margin-top:7px;padding:8px 0;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;background:#c8933a;color:#0f1720;}
.fed-btn.active{background:#4caf50;color:#fff;}
/* Nutrition */
.summary-box{background:#1a2535;border-radius:12px;padding:13px;margin-bottom:10px;}
.summary-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.summary-sub{font-size:10px;color:#888;margin-bottom:8px;}
.pill-row{display:flex;gap:7px;flex-wrap:wrap;}
.s-pill{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.n-card{background:#1a2535;border-radius:9px;padding:11px;margin-bottom:7px;cursor:pointer;}
.n-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.n-name{font-size:12px;font-weight:700;}
.n-val{font-size:10px;}
.n-pill{display:inline-block;padding:2px 6px;border-radius:99px;font-size:9px;font-weight:700;margin-left:5px;}
.bar-bg{height:5px;background:#0a1018;border-radius:3px;margin-bottom:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.n-range{font-size:9px;color:#555;}
/* Guide */
.guide-card{background:#1a2535;border-radius:12px;padding:14px;margin-bottom:10px;}
.guide-title{font-size:14px;font-weight:700;color:#c8933a;margin-bottom:10px;}
.guide-section{font-size:9px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase;margin-top:10px;margin-bottom:5px;}
.guide-item{font-size:12px;color:#b0a090;line-height:1.9;padding-left:4px;}
.guide-item.warn{color:#ff9800;}
.guide-item.avoid{color:#f44336;}
.guide-item.opt{color:#666;}
.protein-row{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.protein-name{font-size:12px;flex:1;}
.protein-tag{font-size:9px;padding:2px 6px;border-radius:99px;font-weight:700;}
.tag-lean{background:rgba(76,175,80,0.15);color:#4caf50;}
.tag-mod{background:rgba(200,147,58,0.15);color:#c8933a;}
.tag-high{background:rgba(244,67,54,0.15);color:#f44336;}
.organ-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.organ-name{font-size:12px;}
.organ-freq{font-size:10px;color:#888;text-align:right;}
.organ-note{font-size:9px;color:#555;text-align:right;}
.calc-formula{font-size:11px;color:#888;text-align:center;background:#0f1720;border-radius:8px;padding:9px;margin-bottom:14px;font-family:'SF Mono',Menlo,monospace;line-height:1.6;}
.prep-step{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px;font-size:13px;color:#e8dcc8;line-height:1.45;}
.prep-step:last-child{margin-bottom:0;}
.prep-num{flex-shrink:0;width:23px;height:23px;border-radius:50%;background:#c8933a;color:#0f1720;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.calc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;}
.calc-label{font-size:12px;color:#aaa;flex-shrink:0;}
.calc-input{width:80px;padding:8px 10px;background:#0f1720;border:1px solid rgba(200,147,58,0.3);border-radius:8px;color:#e8dcc8;font-size:14px;text-align:center;}
.calc-select{flex:1;max-width:230px;padding:8px 10px;background:#0f1720;border:1px solid rgba(200,147,58,0.3);border-radius:8px;color:#e8dcc8;font-size:12px;}
.calc-result{margin-top:10px;background:#0f1720;border-radius:10px;padding:4px 12px;}
.calc-out{display:flex;justify-content:space-between;font-size:12px;color:#999;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.calc-out:last-child{border-bottom:none;}
.calc-out.highlight{color:#c8933a;font-weight:700;font-size:13px;}
.calc-note{font-size:10px;color:#555;margin-top:10px;line-height:1.5;}
.usda-key-row{margin-bottom:12px;}
.usda-key-input{width:100%;padding:9px 10px;background:#0f1720;border:1px solid rgba(200,147,58,0.3);border-radius:8px;color:#e8dcc8;font-size:12px;margin-bottom:5px;}
.usda-key-hint{font-size:10px;color:#666;}
.usda-key-hint a{color:#c8933a;}
.usda-search-row{display:flex;gap:8px;margin-bottom:10px;}
.usda-search-input{flex:1;padding:10px 12px;background:#0f1720;border:1px solid rgba(200,147,58,0.3);border-radius:8px;color:#e8dcc8;font-size:13px;}
.usda-search-btn{padding:10px 16px;background:#c8933a;border:none;border-radius:8px;color:#0f1720;font-weight:700;font-size:13px;cursor:pointer;}
.usda-types-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.usda-type-chip{font-size:10px;padding:5px 10px;border-radius:99px;border:1px solid rgba(200,147,58,0.3);background:transparent;color:#888;cursor:pointer;}
.usda-type-chip.on{background:rgba(200,147,58,0.18);color:#c8933a;border-color:#c8933a;}
.usda-status{font-size:11px;color:#888;margin-bottom:8px;}
.usda-status.err{color:#f44336;}
.usda-result-item{padding:9px 10px;background:#0f1720;border-radius:8px;margin-bottom:6px;cursor:pointer;}
.usda-result-name{font-size:12px;color:#e8dcc8;margin-bottom:3px;}
.usda-result-meta{font-size:10px;color:#666;}
.usda-result-badge{display:inline-block;padding:1px 7px;border-radius:99px;font-size:9px;font-weight:700;background:rgba(100,181,246,0.15);color:#64b5f6;margin-left:6px;}
.usda-detail{margin-top:12px;border-top:1px solid rgba(255,255,255,0.08);padding-top:12px;}
.usda-detail-title{font-size:13px;font-weight:700;color:#c8933a;margin-bottom:8px;}
.usda-nutrient-table{margin-bottom:12px;}
.usda-nutrient-row{display:flex;justify-content:space-between;font-size:11px;color:#999;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.usda-snippet{width:100%;min-height:70px;background:#0f1720;border:1px solid rgba(200,147,58,0.3);border-radius:8px;color:#4caf50;font-size:11px;font-family:'SF Mono',Menlo,monospace;padding:10px;resize:vertical;margin-bottom:8px;}
.usda-approx-note{font-size:9px;color:#666;margin-top:6px;line-height:1.5;}
.usda-modal-toggle{font-size:11px;color:#c8933a;cursor:pointer;margin:12px 0 10px;text-decoration:underline;display:inline-block;}
.usda-modal-panel{background:#0f1720;border-radius:10px;padding:12px;margin-bottom:14px;}
/* Modal */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end;}
.modal{background:#1a2535;border-radius:16px 16px 0 0;width:100%;padding:20px;max-height:78vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.modal-title{font-size:15px;font-weight:700;color:#c8933a;}
.modal-close{background:transparent;border:none;color:#888;font-size:22px;cursor:pointer;line-height:1;}
.modal-hint{font-size:11px;color:#666;margin-bottom:12px;}
.ai-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.ai-name{font-size:13px;flex:1;}
.ai-input{width:56px;padding:6px 8px;background:#0f1720;border:1px solid rgba(200,147,58,0.3);border-radius:7px;color:#e8dcc8;font-size:14px;text-align:center;}
.ai-unit{font-size:10px;color:#666;margin-left:5px;}
.save-btn{width:100%;padding:13px;background:#c8933a;border:none;border-radius:10px;color:#0f1720;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px;}
.empty-state{text-align:center;padding-top:60px;}
/* History */
.view-toggle{display:flex;gap:6px;margin-bottom:12px;}
.view-btn{flex:1;padding:9px 0;border-radius:9px;border:1px solid rgba(200,147,58,0.3);background:transparent;color:#888;font-size:12px;font-weight:700;cursor:pointer;}
.view-btn.active{background:#c8933a;color:#0f1720;border-color:#c8933a;}
.hist-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:#1a2535;border-radius:12px;padding:10px 14px;}
.hist-period-label{font-size:14px;font-weight:700;text-align:center;flex:1;}
.week-day-row{background:#1a2535;border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.week-day-row.today{border:1px solid rgba(200,147,58,0.5);}
.week-day-name{font-size:12px;font-weight:700;color:#e8dcc8;}
.week-meals{display:flex;gap:8px;margin-top:7px;}
.week-meal-pill{flex:1;font-size:10px;padding:6px 8px;border-radius:7px;background:#0f1720;color:#888;}
.week-meal-pill.fed{background:rgba(76,175,80,0.15);color:#4caf50;}
.week-note{margin-top:8px;font-size:11px;color:#c8933a;padding:7px 9px;background:rgba(200,147,58,0.06);border-radius:7px;cursor:pointer;word-break:break-word;}
.week-addl-line{margin-top:7px;font-size:11px;color:#999;padding:6px 9px;background:rgba(255,255,255,0.03);border-radius:7px;}
.day-view-card{background:#1a2535;border-radius:12px;padding:14px;}
.month-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
.month-weekday-cell{text-align:center;font-size:10px;color:#666;font-weight:700;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.month-cell{aspect-ratio:1;background:#1a2535;border-radius:8px;padding:4px;position:relative;cursor:pointer;}
.month-cell.empty{background:transparent;cursor:default;}
.month-cell.today{border:1px solid #c8933a;}
.month-cell.full-fed{background:rgba(76,175,80,0.12);}
.month-cell.half-fed{background:rgba(255,152,0,0.10);}
.month-cell-day{font-size:11px;font-weight:600;color:#e8dcc8;}
.month-cell-dots{display:flex;gap:3px;margin-top:4px;}
.m-dot{width:5px;height:5px;border-radius:50%;background:#3a3a4a;}
.m-dot.on{background:#4caf50;}
.note-dot{position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:#c8933a;}
.year-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mini-month{background:#1a2535;border-radius:10px;padding:8px;cursor:pointer;}
.mini-month-label{font-size:11px;font-weight:700;color:#c8933a;margin-bottom:5px;text-align:center;}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mini-cell{aspect-ratio:1;border-radius:2px;background:#0f1720;}
.mini-cell.empty{background:transparent;}
.mini-cell.full{background:#4caf50;}
.mini-cell.half{background:#ff9800;}
.dd-label{font-size:10px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.dd-protein{font-size:14px;font-weight:700;margin-bottom:2px;}
.dd-detail{font-size:11px;color:#888;margin-bottom:4px;}
.day-detail-meal{padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.06);}
.note-textarea{width:100%;min-height:90px;background:#0f1720;border:1px solid rgba(200,147,58,0.3);border-radius:8px;color:#e8dcc8;font-size:13px;padding:10px;font-family:inherit;resize:vertical;margin-top:8px;}
.hist-divider{height:1px;background:rgba(200,147,58,0.15);margin:22px 0 16px;}
.actual-toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:#aaa;margin-bottom:14px;cursor:pointer;}
.actual-toggle input{width:16px;height:16px;accent-color:#c8933a;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div style="width:100%">
      <div class="app-title">Human Grade Dog Food Meal Planner</div>
      <input type="text" id="petNameInput" class="pet-name-input" placeholder="Your dog's name" oninput="savePetName(this.value)">
      <div class="app-sub" id="appSub">60 lb &bull; Moderate activity &bull; ~1,335 kcal/day</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-guide"     onclick="showTab('guide')">&#128214; Guide</button>
    <button class="tab"        id="tab-plan"      onclick="showTab('plan')">&#128203; Nutritional Targets &amp; Meal Plan</button>
    <button class="tab"        id="tab-calendar"  onclick="showTab('calendar')">&#128197; Feeding Schedule</button>
    <button class="tab"        id="tab-nutrition" onclick="showTab('nutrition')">&#128202; Nutrition</button>
  </div>
</div>

<div class="page active" id="page-guide"></div>
<div class="page"        id="page-plan"></div>
<div class="page"        id="page-calendar"></div>
<div class="page"        id="page-nutrition"></div>
<div id="modal-root"></div>

<script>
// ── AAFCO TARGETS ─────────────────────────────────────────────────────────────
var AAFCO = [
  {k:"protein",    label:"Protein",         unit:"g",   min:45.0,  max:999,  group:"Macros"},
  {k:"fat",        label:"Fat",             unit:"g",   min:13.8,  max:55,   group:"Macros"},
  {k:"calcium",    label:"Calcium",         unit:"mg",  min:1250,  max:2500, group:"Minerals"},
  {k:"phosphorus", label:"Phosphorus",      unit:"mg",  min:1000,  max:4000, group:"Minerals"},
  {k:"potassium",  label:"Potassium",       unit:"mg",  min:1378,  max:9999, group:"Minerals"},
  {k:"sodium",     label:"Sodium",          unit:"mg",  min:200,   max:1500, group:"Minerals"},
  {k:"chloride",   label:"Chloride",        unit:"mg",  min:300,   max:9999, group:"Minerals"},
  {k:"magnesium",  label:"Magnesium",       unit:"mg",  min:150,   max:9999, group:"Minerals"},
  {k:"iron",       label:"Iron",            unit:"mg",  min:10,    max:250,  group:"Minerals"},
  {k:"copper",     label:"Copper",          unit:"mg",  min:1.83,  max:25,   group:"Minerals"},
  {k:"zinc",       label:"Zinc",            unit:"mg",  min:15.0,  max:100,  group:"Minerals"},
  {k:"iodine",     label:"Iodine",          unit:"mg",  min:0.22,  max:2.75, group:"Minerals"},
  {k:"selenium",   label:"Selenium",        unit:"mcg", min:87.5,  max:500,  group:"Minerals"},
  {k:"omega3",     label:"Omega-3",         unit:"mg",  min:110,   max:9999, group:"Fatty Acids"},
  {k:"omega6",     label:"Omega-6",         unit:"mg",  min:2800,  max:9999, group:"Fatty Acids"},
  {k:"vitA",       label:"Vitamin A",       unit:"IU",  min:1278,  max:50000,group:"Vitamins"},
  {k:"vitD",       label:"Vitamin D",       unit:"IU",  min:136,   max:1800, group:"Vitamins"},
  {k:"vitE",       label:"Vitamin E",       unit:"IU",  min:11,    max:9999, group:"Vitamins"},

  var key=ds+"_"+slot+"_"+category;

function dateKey(y,m,d){ return y+"-"+(m<10?"0"+m:m)+"-"+(d<10?"0"+d:d); }
function getDOW(y,m,d){ return new Date(y,m,d).getDay(); }
function getWK(y,m,d){
  var jan1 = new Date(y,0,1);
  var doy  = Math.round((new Date(y,m,d)-jan1)/86400000);
  return (Math.floor(doy/7)%4)+1;
}
function fmtDate(y,m,d){
  var wdays=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var mons=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return wdays[getDOW(y,m,d)]+", "+mons[m]+" "+d;
}
function advDay(n){

function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function startOfWeek(y,m,d){
  var dow=getDOW(y,m,d);

  return {y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate()};
}

  var t=zeroN();
  if(m){
    var pOz=(ds&&slot)?getEffectiveAmount(ds,slot,"protein"):DEFAULT_AMOUNTS.protein;
    var sOz=(ds&&slot)?getEffectiveAmount(ds,slot,"starch"):DEFAULT_AMOUNTS.starch;
    var vOz=(ds&&slot)?getEffectiveAmount(ds,slot,"veg"):DEFAULT_AMOUNTS.veg;
    var oOz=(ds&&slot)?getEffectiveAmount(ds,slot,"organ"):DEFAULT_AMOUNTS.organ;
    addFood(t,FOODS[m.protein],pOz);
    addFood(t,FOODS[m.starch],sOz);
    addFood(t,FOODS[m.veg],vOz);
    if(m.organ) addFood(t,FOODS[m.organ],oOz);
    if(ds && slot){
      var sc=sumCheckedSupplements(ds,slot,isFishMeal(m.protein),m.protein);
      for(var i=0;i<KEYS.length;i++) t[KEYS[i]]+=(sc[KEYS[i]]||0);
    } else {
      for(var i2=0;i2<KEYS.length;i2++) t[KEYS[i2]]+=(SUPPS[KEYS[i2]]||0);
    }
  }
  if(addins){
    var ns=Object.keys(addins);
    for(var j=0;j<ns.length;j++){ if(addins[ns[j]]>0) addFood(t,ADDINS[ns[j]],addins[ns[j]]); }
  }
  return t;
}

// ── SOURCE-TRACKED NUTRITION (powers the "tap a nutrient to see contributors" feature) ────
function accumulateNutrients(totals,sources,sourceLabel,foodObj,oz){
  if(!foodObj) return;
  for(var k=0;k<KEYS.length;k++){
    var key=KEYS[k];
    var contribution=(foodObj[key]||0)*oz;
    if(!contribution) continue;
    totals[key]=(totals[key]||0)+contribution;
    if(!sources[key]) sources[key]={};
    sources[key][sourceLabel]=(sources[key][sourceLabel]||0)+contribution;
  }
}

function calcMealTracked(m,addins,ds,slot,totals,sources){
  if(m){
    var pOz=(ds&&slot)?getEffectiveAmount(ds,slot,"protein"):DEFAULT_AMOUNTS.protein;
    var sOz=(ds&&slot)?getEffectiveAmount(ds,slot,"starch"):DEFAULT_AMOUNTS.starch;
    var vOz=(ds&&slot)?getEffectiveAmount(ds,slot,"veg"):DEFAULT_AMOUNTS.veg;
    var oOz=(ds&&slot)?getEffectiveAmount(ds,slot,"organ"):DEFAULT_AMOUNTS.organ;
    accumulateNutrients(totals,sources,m.protein,FOODS[m.protein],pOz);
    accumulateNutrients(totals,sources,m.starch,FOODS[m.starch],sOz);
    accumulateNutrients(totals,sources,m.veg,FOODS[m.veg],vOz);
    if(m.organ) accumulateNutrients(totals,sources,m.organ,FOODS[m.organ],oOz);
    if(ds && slot){
      var isFish=isFishMeal(m.protein);
      var items=getSupplementItems(isFish,ds,slot,m.protein);
      for(var i=0;i<items.length;i++){
        if(isSuppChecked(ds,slot,items[i].id)){
          if(items[i].id==="herbcube"){
            var comps=getHerbCubeComponents(isFish);
            for(var c=0;c<comps.length;c++) accumulateNutrients(totals,sources,comps[c].name,comps[c].nutr,1);
          } else {
            var label=SUPP_SHORT_LABELS[items[i].id]||items[i].id;
            accumulateNutrients(totals,sources,label,items[i].nutr,1);
          }
        }
      }
    }
  }
  if(addins){
    var ns=Object.keys(addins);
    for(var j=0;j<ns.length;j++){
      if(addins[ns[j]]>0) accumulateNutrients(totals,sources,ns[j],ADDINS[ns[j]],addins[ns[j]]);
    }
  }
}

function calcNutritionRange(startY,startM,startD,endY,endM,endD){
  var totals=zeroN();
  var sources={};
  var mealCount=0;
  var dayCount=0;

  var cursor=new Date(startY,startM,startD);
  var endDate=new Date(endY,endM,endD);

  while(cursor<=endDate){
    var y=cursor.getFullYear(), m=cursor.getMonth(), d=cursor.getDate();
    var ds=dateKey(y,m,d);
    var dow=cursor.getDay();
    var wk=getWK(y,m,d);
    var dn=DAYS_OF_WEEK[dow];
    var dm=(WEEKS[wk]||{})[dn]||{};
    var dayHasFed=false;
    var slots=["am","pm"];
    for(var s=0;s<2;s++){
      var key=ds+"_"+slots[s];
      if(fedLog[key]){
        mealCount++; dayHasFed=true;
        var effMeal=getEffectiveMeal(ds,slots[s],dm[slots[s]]);
        calcMealTracked(effMeal,addinsLog[key]||{},ds,slots[s],totals,sources);
      }
    }
    if(dayHasFed) dayCount++;
    cursor.setDate(cursor.getDate()+1);
  }

  return { totals:totals, sources:sources, mealCount:mealCount, dayCount:dayCount };
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function getProteinOverride(ds,slot){
  return proteinOverrides[ds+"_"+slot] || null;
}

function setProteinOverride(ds,slot,proteinName){
  var key=ds+"_"+slot;
  if(proteinName){ proteinOverrides[key]=proteinName; }
  else { delete proteinOverrides[key]; }
  try{localStorage.setItem("mya_protein_swaps",JSON.stringify(proteinOverrides));}catch(e){}
}

function getVegOverride(ds,slot){
  return vegOverrides[ds+"_"+slot] || null;
}

function setVegOverride(ds,slot,vegName){
  var key=ds+"_"+slot;
  if(vegName){ vegOverrides[key]=vegName; }
  else { delete vegOverrides[key]; }
  try{localStorage.setItem("mya_veg_swaps",JSON.stringify(vegOverrides));}catch(e){}
}

function getStarchOverride(ds,slot){
  return starchOverrides[ds+"_"+slot] || null;
}

function setStarchOverride(ds,slot,starchName){
  var key=ds+"_"+slot;
  if(starchName){ starchOverrides[key]=starchName; }
  else { delete starchOverrides[key]; }
  try{localStorage.setItem("mya_starch_swaps",JSON.stringify(starchOverrides));}catch(e){}
}

// Organ override needs to distinguish "never touched" (null) from "explicitly set to no organ" ("")
function getOrganOverride(ds,slot){
  var key=ds+"_"+slot;
  return organOverrides.hasOwnProperty(key) ? organOverrides[key] : null;
}

function setOrganOverride(ds,slot,organName){
  var key=ds+"_"+slot;
  if(organName===null){ delete organOverrides[key]; }
  else { organOverrides[key]=organName; } // organName may be "" meaning explicit "no organ"
  try{localStorage.setItem("mya_organ_swaps",JSON.stringify(organOverrides));}catch(e){}
}

// Broth isn't part of the rotation's meal object — it's a supplement choice with a fixed
// default ("Reserved Cooking Liquid"), so it's tracked separately rather than via scheduledMeal.
function getBrothOverride(ds,slot){
  return brothOverrides[ds+"_"+slot] || null;
}

function setBrothOverride(ds,slot,brothName){
  var key=ds+"_"+slot;
  if(brothName){ brothOverrides[key]=brothName; }
  else { delete brothOverrides[key]; }
  try{localStorage.setItem("mya_broth_swaps",JSON.stringify(brothOverrides));}catch(e){}
}

function getEffectiveMeal(ds,slot,scheduledMeal){
  if(!scheduledMeal) return scheduledMeal;
  var pOverride=getProteinOverride(ds,slot);
  var sOverride=getStarchOverride(ds,slot);
  var vOverride=getVegOverride(ds,slot);
  var oOverride=getOrganOverride(ds,slot);
  return {
    protein: pOverride || scheduledMeal.protein,
    starch: sOverride || scheduledMeal.starch,
    veg: vOverride || scheduledMeal.veg,
    organ: (oOverride!==null) ? (oOverride||null) : scheduledMeal.organ
  };
}

function isFishMeal(proteinName){
  return proteinName==="Sardines (canned)" || proteinName==="Salmon (canned)";
}

function suppNutr(overrides){
  var t=zeroN();
  for(var k in overrides){ if(overrides.hasOwnProperty(k)) t[k]=overrides[k]; }
  return t;
}

function getBrothNutrients(brothChoice,brothOz){
  var base=FOODS[brothChoice];
  if(!base) return zeroN();
  // Broth is a diluted liquid extract, not the solid meat — roughly 8% of the protein's
  // per-oz nutrient density, applied to the actual serving size used.
  var t=zeroN();
  var factor=0.08*(brothOz!=null?brothOz:DEFAULT_AMOUNTS.broth);
  for(var k=0;k<KEYS.length;k++) t[KEYS[k]]=(base[KEYS[k]]||0)*factor;
  return t;
}

// The herb cube is one premade item, but it's made of 3 real ingredients — each gets its
// own small, realistic nutrient estimate so the breakdown can show them individually,
// rather than lumping everything under one generic "Herb Cube" label.
function getHerbCubeComponents(isFish){
  var vitESource = isFish
    ? { name:"Vitamin E Oil",       nutr:suppNutr({vitE:200}) }
    : { name:"Mixed Tocopherols",   nutr:suppNutr({vitE:3.4}) };
  var herbSource = isFish
    ? { name:"Spearmint",           nutr:suppNutr({vitA:10,vitK:2,calcium:0.5}) }
    : { name:"Ginger",              nutr:suppNutr({potassium:1,magnesium:0.1,iron:0.02}) };
  return [
    { name:"Parsley", nutr:suppNutr({vitK:4,vitA:15,calcium:1,iron:0.1}) },
    vitESource,
    herbSource
  ];
}

function sumNutrList(list){
  var t=zeroN();
  for(var i=0;i<list.length;i++){
    for(var k=0;k<KEYS.length;k++) t[KEYS[k]]+=(list[i].nutr[KEYS[k]]||0);
  }
  return t;
}

function getSupplementItems(isFish,ds,slot,effectiveProtein){
  var fallbackProtein=effectiveProtein||PROTEIN_OPTIONS[0];
  var brothChoice=(ds&&slot) ? (getBrothOverride(ds,slot)||fallbackProtein) : fallbackProtein;
  var brothOz=(ds&&slot) ? getEffectiveAmount(ds,slot,"broth") : DEFAULT_AMOUNTS.broth;
  var herbCubeLabel = isFish
    ? "Herb cube &rarr; &#188; tsp parsley + 200 IU Vitamin E oil + 1 pinch spearmint"
    : "Herb cube &rarr; &#188; tsp parsley + &#188; tsp mixed tocopherols (Vit E) + &#8539; tsp ginger";
  var herbCubeNutr = sumNutrList(getHerbCubeComponents(isFish));
  var brothLabel = (brothOz===DEFAULT_AMOUNTS.broth)
    ? "1&#189; tbsp "+brothChoice+" broth"
    : brothOz+" oz "+brothChoice+" broth";
  return [
    { id:"eggshell", label:"&#189; tsp eggshell powder &rarr; calcium ~800mg", nutr:suppNutr({calcium:800}) },
    { id:"salt",     label:"1 small pinch iodized salt &rarr; iodine + sodium", nutr:suppNutr({sodium:115,chloride:175,iodine:0.10}) },
    { id:"psyllium", label:"&#188; tsp psyllium husk powder &rarr; fiber", nutr:zeroN() },
    { id:"herbcube", label:herbCubeLabel, nutr:herbCubeNutr },
    { id:"broth",    label:brothLabel, nutr:getBrothNutrients(brothChoice,brothOz) }
  ];
}

function isSuppChecked(ds,slot,itemId){
  var key=ds+"_"+slot;
  if(!suppChecks[key] || suppChecks[key][itemId]===undefined) return true; // default: checked
  return !!suppChecks[key][itemId];
}

function setSuppChecked(ds,slot,itemId,checked){
  var key=ds+"_"+slot;
  if(!suppChecks[key]) suppChecks[key]={};
  suppChecks[key][itemId]=checked;
  try{localStorage.setItem("mya_supp_checks",JSON.stringify(suppChecks));}catch(e){}
}

function toggleSuppCheck(ds,slot,itemId,checked){
  setSuppChecked(ds,slot,itemId,checked);
}

function sumCheckedSupplements(ds,slot,isFish,effectiveProtein){
  var t=zeroN();
  var items=getSupplementItems(isFish,ds,slot,effectiveProtein);
  for(var i=0;i<items.length;i++){
    if(isSuppChecked(ds,slot,items[i].id)){
      for(var k=0;k<KEYS.length;k++) t[KEYS[k]]+=(items[i].nutr[KEYS[k]]||0);
    }
  }
  return t;
}

function buildCard(ds,slot,label,scheduledMeal){
  var key=ds+"_"+slot;
  var fed=!!fedLog[key];
  var pOverride=getProteinOverride(ds,slot);
  var sOverride=getStarchOverride(ds,slot);
  var vOverride=getVegOverride(ds,slot);
  var oOverride=getOrganOverride(ds,slot);
  var bOverride=getBrothOverride(ds,slot);
  var m=getEffectiveMeal(ds,slot,scheduledMeal);

  var h='<div class="meal-card'+(fed?" fed":"")+'">'
    +'<div class="slot-label">'+label+'</div>';

  if(m){
    var isFish=isFishMeal(m.protein);
    var pOz=getEffectiveAmount(ds,slot,"protein");
    var sOz=getEffectiveAmount(ds,slot,"starch");
    var vOz=getEffectiveAmount(ds,slot,"veg");
    var oOz=getEffectiveAmount(ds,slot,"organ");
    h+='<div class="meal-protein"><span>'+m.protein+'</span><span class="oz-tag amt-tag" onclick="openAmountModal(\''+ds+'\',\''+slot+'\',\'protein\')">'+pOz+' oz &#9998;</span></div>';
    if(pOverride) h+='<div class="swap-note">&#8646; protein swapped from '+scheduledMeal.protein+'</div>';
    if(getAmountOverride(ds,slot,"protein")!==null) h+='<div class="swap-note">&#8646; amount adjusted from '+DEFAULT_AMOUNTS.protein+' oz</div>';
    h+='<div class="recipe-list">'
      +'<div class="recipe-line"><span>'+m.starch+'</span><span class="oz-tag amt-tag" onclick="openAmountModal(\''+ds+'\',\''+slot+'\',\'starch\')">'+sOz+' oz &#9998;</span></div>';
    if(sOverride) h+='<div class="swap-note">&#8646; starch swapped from '+scheduledMeal.starch+'</div>';
    if(getAmountOverride(ds,slot,"starch")!==null) h+='<div class="swap-note">&#8646; amount adjusted from '+DEFAULT_AMOUNTS.starch+' oz</div>';
    if(m.organ){
      h+='<div class="recipe-line"><span>'+m.organ+'</span><span class="oz-tag amt-tag" onclick="openAmountModal(\''+ds+'\',\''+slot+'\',\'organ\')">'+oOz+' oz &#9998;</span></div>';
      if(getAmountOverride(ds,slot,"organ")!==null) h+='<div class="swap-note">&#8646; amount adjusted from '+DEFAULT_AMOUNTS.organ+' oz</div>';
    } else if(oOverride!==null){
      h+='<div class="recipe-line"><span style="color:#555">No organ</span></div>';
    }
    if(oOverride!==null) h+='<div class="swap-note">&#8646; organ swapped from '+(scheduledMeal.organ||"no organ")+'</div>';
    h+='<div class="recipe-line"><span>'+m.veg+'</span><span class="oz-tag amt-tag" onclick="openAmountModal(\''+ds+'\',\''+slot+'\',\'veg\')">'+vOz+' oz &#9998;</span></div>';
    if(vOverride) h+='<div class="swap-note">&#8646; veg swapped from '+scheduledMeal.veg+'</div>';
    if(getAmountOverride(ds,slot,"veg")!==null) h+='<div class="swap-note">&#8646; amount adjusted from '+DEFAULT_AMOUNTS.veg+' oz</div>';
    var supps=getSupplementItems(isFish,ds,slot,m.protein);
    h+='<div class="recipe-divider"></div>';
    for(var i=0;i<supps.length;i++){
      var checked=isSuppChecked(ds,slot,supps[i].id);
      var numBadge=(supps[i].id==="herbcube") ? '<span class="step-num">5</span>' : '';
      var amtEdit=(supps[i].id==="broth") ? ' <span class="amt-tag" onclick="event.preventDefault();event.stopPropagation();openAmountModal(\''+ds+'\',\''+slot+'\',\'broth\')">&#9998;</span>' : '';
      h+='<label class="supp-check-row">'
        +'<input type="checkbox" '+(checked?"checked":"")+' onchange="toggleSuppCheck(\''+ds+'\',\''+slot+'\',\''+supps[i].id+'\',this.checked)">'
        +numBadge
        +'<span>'+supps[i].label+amtEdit+'</span>'
        +'</label>';
    }
    if(bOverride) h+='<div class="swap-note">&#8646; broth swapped to '+bOverride+'</div>';
    if(getAmountOverride(ds,slot,"broth")!==null) h+='<div class="swap-note">&#8646; broth amount adjusted from '+DEFAULT_AMOUNTS.broth+' oz</div>';
    h+='</div>';

    h+=buildAdditionalItemsBox(ds,slot);

    h+='<button class="addins-btn" onclick="openSwapModal(\''+ds+'\',\''+slot+'\',\'broth\')"><span class="step-num">1</span>&#8646; Swap Broth</button>';
    h+='<button class="addins-btn" onclick="openSwapModal(\''+ds+'\',\''+slot+'\',\'starch\')"><span class="step-num">2</span>&#8646; Swap Starch</button>';
    h+='<button class="addins-btn" onclick="openSwapModal(\''+ds+'\',\''+slot+'\',\'organ\')"><span class="step-num">3</span>&#8646; Swap Organ</button>';
    h+='<button class="addins-btn" onclick="openSwapModal(\''+ds+'\',\''+slot+'\',\'veg\')"><span class="step-num">4</span>&#8646; Swap Vegetable</button>';
    h+='<button class="addins-btn" onclick="openSwapModal(\''+ds+'\',\''+slot+'\',\'protein\')"><span class="step-num">6</span>&#8646; Swap Protein</button>';
    h+='<button class="fed-btn'+(fed?" active":"")+'" onclick="toggleFed(\''+key+'\')">'
      +(fed?"&#10003; Fed!":"Mark Fed")+'</button>';
  } else {
    h+='<div style="color:#3a3a4a;font-size:11px;margin-top:8px">No meal scheduled</div>';
  }
  return h+'</div>';
}

var SWAP_CONFIG = {
  protein: { title:"Swap Protein",    options:PROTEIN_OPTIONS, allowNone:false, getOverride:getProteinOverride, setOverride:setProteinOverride, field:"protein" },
  starch:  { title:"Swap Starch",     options:STARCH_OPTIONS,  allowNone:false, getOverride:getStarchOverride,  setOverride:setStarchOverride,  field:"starch" },
  veg:     { title:"Swap Vegetable",  options:VEG_OPTIONS,     allowNone:false, getOverride:getVegOverride,     setOverride:setVegOverride,     field:"veg" },
  organ:   { title:"Swap Organ",      options:ORGAN_OPTIONS,   allowNone:true,  getOverride:getOrganOverride,   setOverride:setOrganOverride,   field:"organ" },
  broth:   { title:"Swap Broth",      options:BROTH_OPTIONS,   allowNone:false, getOverride:getBrothOverride,   setOverride:setBrothOverride,   field:null,
             hintWord:"Default (matches today's protein)", schedTag:"default",
             dynamicDefault:function(ds,slot,scheduledMeal){ return getProteinOverride(ds,slot) || scheduledMeal.protein; } }
};

function getSwapScheduledValue(cfg,ds,slot,scheduledMeal){
  if(cfg.dynamicDefault) return cfg.dynamicDefault(ds,slot,scheduledMeal);
  return cfg.field ? scheduledMeal[cfg.field] : cfg.defaultValue;
}

function openSwapModal(ds,slot,category){
  var cfg=SWAP_CONFIG[category];
  var dow=getDOW(curYear,curMonth,curDay);
  var wk=getWK(curYear,curMonth,curDay);
  var dn=DAYS_OF_WEEK[dow];
  var dm=(WEEKS[wk]||{})[dn]||{};
  var scheduledMeal=dm[slot];
  if(!scheduledMeal) return;
  var scheduledValue=getSwapScheduledValue(cfg,ds,slot,scheduledMeal); // may be null for organ
  var current=cfg.getOverride(ds,slot); // null = no override (organ: "" = explicit none)
  var tagWord=cfg.schedTag||"scheduled";

  var rows="";
  for(var i=0;i<cfg.options.length;i++){
    var p=cfg.options[i];
    var isScheduled=(p===scheduledValue);
    var isActive=(current!==null) ? (p===current) : isScheduled;
    rows+='<div class="swap-option'+(isActive?" active":"")+'" onclick="applySwap(\''+ds+'\',\''+slot+'\',\''+category+'\',\''+p+'\')">'
      +p+(isScheduled?' <span class="swap-sched-tag">'+tagWord+'</span>':'')
      +'</div>';
  }
  if(cfg.allowNone){
    var isSchedNone=(scheduledValue===null||scheduledValue===undefined);
    var isActiveNone=(current!==null) ? (current==="") : isSchedNone;
    rows+='<div class="swap-option'+(isActiveNone?" active":"")+'" onclick="applySwap(\''+ds+'\',\''+slot+'\',\''+category+'\',\'\')">'
      +'No organ'+(isSchedNone?' <span class="swap-sched-tag">'+tagWord+'</span>':'')
      +'</div>';
  }

  var schedLabel=scheduledValue||"No organ";
  var hintWord=cfg.hintWord||"Scheduled";

  document.getElementById("modal-root").innerHTML=
    '<div class="overlay" id="mbg"><div class="modal">'
    +'<div class="modal-head"><div class="modal-title">'+cfg.title+'</div>'
    +'<button class="modal-close" onclick="closeModal()">&#10005;</button></div>'
    +'<div class="modal-hint">'+hintWord+': '+schedLabel+'. Pick what you actually fed:</div>'
    +rows
    +(current!==null ? '<button class="usda-modal-toggle" onclick="resetSwap(\''+ds+'\',\''+slot+'\',\''+category+'\')" style="margin-top:14px">Reset to '+tagWord+' (remove swap)</button>' : '')
    +'</div></div>';

  document.getElementById("mbg").addEventListener("click",function(e){if(e.target===this)closeModal();});
}

function applySwap(ds,slot,category,value){
  var cfg=SWAP_CONFIG[category];
  var dow=getDOW(curYear,curMonth,curDay);
  var wk=getWK(curYear,curMonth,curDay);
  var dn=DAYS_OF_WEEK[dow];
  var dm=(WEEKS[wk]||{})[dn]||{};
  var scheduledMeal=dm[slot];
  var scheduledValue=getSwapScheduledValue(cfg,ds,slot,scheduledMeal)||""; // normalize null/undefined to ""

  if(value===scheduledValue){
    // picking the same as scheduled/default is the same as removing the override
    cfg.setOverride(ds,slot,null);
  } else {
    cfg.setOverride(ds,slot,value); // value may be "" for explicit "no organ"
  }
  closeModal();
  renderCalendarPage();
}

function resetSwap(ds,slot,category){
  SWAP_CONFIG[category].setOverride(ds,slot,null);
  closeModal();
  renderCalendarPage();
}

function modalUsdaStatus(msg,isErr){
  var el=document.getElementById("usdaModalStatus");
  el.className="usda-status"+(isErr?" err":"");
  el.innerHTML=msg;
}

function searchUsdaModal(){
  var q=document.getElementById("usdaModalQuery").value.trim();
  if(!USDA_KEY){ modalUsdaStatus("Paste your free USDA API key on the Guide tab first.",true); return; }
  if(!q){ modalUsdaStatus("Type a food name to search.",true); return; }

  var types=[];
  for(var i=0;i<USDA_DATA_TYPES.length;i++){ if(usdaSelectedTypes[USDA_DATA_TYPES[i]]) types.push(USDA_DATA_TYPES[i]); }
  if(types.length===0){ modalUsdaStatus("Select at least one data type.",true); return; }

  document.getElementById("usdaModalResults").innerHTML="";
  modalUsdaStatus("Searching USDA FoodData Central&hellip;",false);

  fetchUsdaSearch(q, types, function(foods){
    if(foods.length===0){ modalUsdaStatus("No matches found. Try a simpler search term.",false); return; }
    modalUsdaStatus(foods.length+" results &mdash; tap one to add it", false);
    renderUsdaModalResults(foods);
  }, function(msg){ modalUsdaStatus(msg,true); });
}

function renderUsdaModalResults(foods){
  var html="";
  for(var i=0;i<foods.length;i++){
    var f=foods[i];
    var name=escapeHtml(f.description||"Unknown");
    var brand=f.brandOwner?(" &mdash; "+escapeHtml(f.brandOwner)):"";
    html+='<div class="usda-result-item" onclick="addUsdaFoodToAddins('+f.fdcId+')">'
      +'<div class="usda-result-name">'+name+'<span class="usda-result-badge">'+escapeHtml(f.dataType||"")+'</span></div>'
      +'<div class="usda-result-meta">FDC #'+f.fdcId+brand+'</div>'
      +'</div>';
  }
  document.getElementById("usdaModalResults").innerHTML=html;
}

function collectAddinDraft(){
  var draft={};
  for(var i=0;i<ADDIN_NAMES.length;i++){
    var el=document.getElementById("ai"+i);
    if(el && el.value) draft[ADDIN_NAMES[i]]=el.value;
  }
  return draft;
}

function addUsdaFoodToAddins(fdcId){
  modalUsdaStatus("Adding ingredient&hellip;",false);
  var draft=collectAddinDraft();

  fetchUsdaDetail(fdcId, function(detail){
    var perOz=per100gToPerOz(extractPer100g(detail));
    var name=detail.description;

    ADDINS[name]=perOz;
    customAddins[name]=perOz;
    try{localStorage.setItem("mya_custom_addins",JSON.stringify(customAddins));}catch(e){}
    ADDIN_NAMES=Object.keys(ADDINS);

    document.getElementById("addinRowsContainer").innerHTML=buildAddinRowsHtml(draft);
    document.getElementById("usdaModalResults").innerHTML="";
    document.getElementById("usdaModalQuery").value="";
    modalUsdaStatus("&#10003; Added \""+escapeHtml(name)+"\" &mdash; enter ounces above.",false);
  }, function(msg){
    modalUsdaStatus(msg,true);
  });
}

function closeModal(){ document.getElementById("modal-root").innerHTML=""; }
function saveModal(){
  var out={};
  for(var i=0;i<ADDIN_NAMES.length;i++){
    var el=document.getElementById("ai"+i);
    if(el){var v=parseFloat(el.value);if(v>0)out[ADDIN_NAMES[i]]=v;}

  addinsLog[_mk]=out;
  try{localStorage.setItem("mya_addins",JSON.stringify(addinsLog));}catch(e){}
  closeModal(); renderCalendarPage();
}

// ── NUTRITION ─────────────────────────────────────────────────────────────────
function setNutView(v){ nutView=v; renderNutrition(); }

function navNutrition(dir){
  if(nutView==="day"){
    var nd=addDays(nutYear,nutMonth,nutDay,dir);
    nutYear=nd.y; nutMonth=nd.m; nutDay=nd.d;
  } else if(nutView==="week"){
    var nd2=addDays(nutYear,nutMonth,nutDay,dir*7);
    nutYear=nd2.y; nutMonth=nd2.m; nutDay=nd2.d;
  } else if(nutView==="month"){
    var dt=new Date(nutYear,nutMonth+dir,1);
    nutYear=dt.getFullYear(); nutMonth=dt.getMonth();
  } else {
    nutYear+=dir;
  }
  renderNutrition();
}

function renderNutrition(){
  var views=["day","week","month","year"];
  var toggle='<div class="view-toggle">';
  for(var i=0;i<views.length;i++){
    var v=views[i];
    var lbl=v==="day"?"Day":v==="week"?"Week":v==="month"?"Month":"Year";
    toggle+='<button class="view-btn'+(nutView===v?" active":"")+'" onclick="setNutView(\''+v+'\')">'+lbl+'</button>';
  }
  toggle+='</div>';

  var startY,startM,startD,endY,endM,endD,navLabel;
  if(nutView==="day"){
    startY=endY=nutYear; startM=endM=nutMonth; startD=endD=nutDay;
    navLabel=fmtDate(nutYear,nutMonth,nutDay);
  } else if(nutView==="week"){
    var st=startOfWeek(nutYear,nutMonth,nutDay);
    var en=addDays(st.y,st.m,st.d,6);
    startY=st.y; startM=st.m; startD=st.d;
    endY=en.y; endM=en.m; endD=en.d;
    navLabel=monthAbbrev(st.m)+" "+st.d+" &ndash; "+monthAbbrev(en.m)+" "+en.d+(en.y!==st.y?", "+en.y:"");
  } else if(nutView==="month"){
    startY=endY=nutYear; startM=endM=nutMonth;
    startD=1; endD=new Date(nutYear,nutMonth+1,0).getDate();
    navLabel=monthAbbrev(nutMonth)+" "+nutYear;
  } else {
    startY=endY=nutYear; startM=0; endM=11; startD=1; endD=31;
    navLabel=String(nutYear);
  }

  var nav='<div class="hist-nav-row">'
    +'<button class="nav-btn" onclick="navNutrition(-1)">&#8249;</button>'
    +'<div class="hist-period-label">'+navLabel+'</div>'
    +'<button class="nav-btn" onclick="navNutrition(1)">&#8250;</button>'
    +'</div>';

  var result=calcNutritionRange(startY,startM,startD,endY,endM,endD);
  var el=document.getElementById("page-nutrition");

  if(result.mealCount===0){
    el.innerHTML=toggle+nav+'<div class="empty-state"><div style="font-size:40px;margin-bottom:14px">&#x1F43E;</div>'
      +'<div style="font-size:15px;color:#888">No meals logged for this period</div>'
      +'<div style="font-size:12px;color:#555;margin-top:8px">Mark meals as Fed in the Feeding Schedule tab</div></div>';
    return;
  }

  var divisor=(nutView==="day")?1:(result.dayCount||1);
  var avg={};
  for(var j=0;j<KEYS.length;j++) avg[KEYS[j]]=result.totals[KEYS[j]]/divisor;

  _nutSources=result.sources;
  _nutPeriodLabel=navLabel;

  var ok=0,low=0,high=0;
  for(var a=0;a<AAFCO.length;a++){
    var cfg=AAFCO[a],v=avg[cfg.k];
    if(v<cfg.min) low++; else if(cfg.max<999&&v>cfg.max) high++; else ok++;
  }

  var summaryTitle=(petName?escapeHtml(petName)+"'s ":"")+((nutView==="day")?"Daily Totals":"Daily Average");
  var html=toggle+nav+'<div class="summary-box">'
    +'<div class="summary-title">'+summaryTitle+'</div>'
    +'<div class="summary-sub">'+result.mealCount+' meals &bull; '+result.dayCount+' day'+(result.dayCount===1?'':'s')+' logged</div>'
    +'<div class="pill-row">'
    +'<div class="s-pill" style="background:rgba(76,175,80,.15);color:#4caf50">&#10003; '+ok+' Optimal</div>'
    +(low>0?'<div class="s-pill" style="background:rgba(244,67,54,.15);color:#f44336">&#9888; '+low+' Low</div>':'')
    +(high>0?'<div class="s-pill" style="background:rgba(255,152,0,.15);color:#ff9800">&#9888; '+high+' High</div>':'')
    +'</div></div>';
  for(var a=0;a<AAFCO.length;a++){
    var cfg=AAFCO[a],v=avg[cfg.k];
    var status=v<cfg.min?"low":(cfg.max<999&&v>cfg.max?"high":"ok");
    var pct=cfg.max<9000?Math.min((v/cfg.max)*100,100):Math.min((v/(cfg.min*1.5))*100,100);
    var disp=v>=10?Math.round(v):v.toFixed(2);
    var range=cfg.max<9000?cfg.min+"&ndash;"+cfg.max:cfg.min+"+";
    var bc=status==="ok"?"#4caf50":status==="low"?"#f44336":"#ff9800";
    var pb=status==="ok"?"rgba(76,175,80,.15)":status==="low"?"rgba(244,67,54,.15)":"rgba(255,152,0,.15)";
    var pt=status==="ok"?"&#10003; OK":status==="low"?"LOW":"HIGH";
    html+='<div class="n-card" onclick="openNutrientBreakdown(\''+cfg.k+'\')">'
      +'<div class="n-head"><span class="n-name">'+cfg.label+'</span>'
      +'<span class="n-val">'+disp+' '+cfg.unit
      +'<span class="n-pill" style="background:'+pb+';color:'+bc+'">'+pt+'</span></span></div>'
      +'<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+bc+'"></div></div>'
      +'<div class="n-range">Target: '+range+' '+cfg.unit+' &middot; tap for breakdown</div></div>';
  }
  el.innerHTML=html;
}

function openNutrientBreakdown(key){
  var cfg=null;
  for(var i=0;i<AAFCO.length;i++){ if(AAFCO[i].k===key){ cfg=AAFCO[i]; break; } }
  if(!cfg) return;

  var srcMap=_nutSources[key]||{};
  var names=Object.keys(srcMap);
  names.sort(function(a,b){ return srcMap[b]-srcMap[a]; });
  var total=0;
  for(var i=0;i<names.length;i++) total+=srcMap[names[i]];

  var rows="";
  if(names.length===0){
    rows='<div class="dd-detail">No contributing sources in this period.</div>';
  } else {
    for(var i=0;i<names.length;i++){
      var amt=srcMap[names[i]];
      var pctOf=total>0?Math.round((amt/total)*100):0;
      var disp=amt>=10?Math.round(amt):amt.toFixed(2);
      rows+='<div class="usda-nutrient-row"><span>'+escapeHtml(names[i])+'</span><span>'+disp+' '+cfg.unit+' ('+pctOf+'%)</span></div>';
    }
  }

  document.getElementById("modal-root").innerHTML=
    '<div class="overlay" id="mbg"><div class="modal">'
    +'<div class="modal-head"><div class="modal-title">'+cfg.label+' Breakdown</div>'
    +'<button class="modal-close" onclick="closeModal()">&#10005;</button></div>'
    +'<div class="modal-hint">'+_nutPeriodLabel+' &mdash; what contributed</div>'
    +rows
    +'</div></div>';

  document.getElementById("mbg").addEventListener("click",function(e){if(e.target===this)closeModal();});
}

function runCalc(){
  var lbEl=document.getElementById("calcWeight");
  var actEl=document.getElementById("calcActivity");
  if(!lbEl||!actEl) return;
  var lb=parseFloat(lbEl.value)||0;
  var factor=parseFloat(actEl.value)||1.6;
  var activityLabel=actEl.options[actEl.selectedIndex] ? actEl.options[actEl.selectedIndex].text : "";
  var kg=lb/2.2046;
  var rer=70*Math.pow(kg,0.75);
  var mer=rer*factor;
  var kcalPerOz=42.2; // derived from Mya's plan: ~1,350 kcal / 32 oz daily food
  var ozPerDay=mer/kcalPerOz;
  var ozPerMeal=ozPerDay/2;

  _calcState={weight:lb,factor:factor,activityLabel:activityLabel,rer:rer,mer:mer,ozPerDay:ozPerDay,ozPerMeal:ozPerMeal};
  try{localStorage.setItem("mya_calc_state",JSON.stringify(_calcState));}catch(e){}

  document.getElementById("calcResult").innerHTML=
    '<div class="calc-out"><span>RER (resting energy)</span><span>'+Math.round(rer)+' kcal/day</span></div>'
    +'<div class="calc-out highlight"><span>MER (daily calories)</span><span>'+Math.round(mer)+' kcal/day</span></div>'
    +'<div class="calc-out"><span>Est. total food</span><span>'+ozPerDay.toFixed(1)+' oz/day</span></div>'
    +'<div class="calc-out"><span>Per meal (2&times;/day)</span><span>'+ozPerMeal.toFixed(1)+' oz</span></div>';

  updateHeaderSub();
}

function fetchUsdaSearch(q, types, onResults, onError){
  var url="https://api.nal.usda.gov/fdc/v1/foods/search?api_key="+encodeURIComponent(USDA_KEY);
  fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({query:q,dataType:types,pageSize:15})
  })
  .then(function(res){
    if(res.status===401||res.status===403){ throw new Error("Invalid API key. Double-check the key you pasted."); }
    if(res.status===429){ throw new Error("Rate limit reached. Wait a bit and try again."); }
    if(!res.ok){ throw new Error("USDA server error ("+res.status+")."); }
    return res.json();
  })
  .then(function(data){ onResults(data.foods||[]); })
  .catch(function(err){ onError(err.message||"Search failed. Check your connection and API key."); });
}

function fetchUsdaDetail(fdcId, onDetail, onError){
  var url="https://api.nal.usda.gov/fdc/v1/food/"+fdcId+"?api_key="+encodeURIComponent(USDA_KEY);
  fetch(url)
    .then(function(res){
      if(!res.ok){ throw new Error("Couldn't load food details ("+res.status+")."); }
      return res.json();
    })
    .then(onDetail)
    .catch(function(err){ onError(err.message||"Couldn't load food details."); });
}

function getNutrientFields(entry){
  if(entry.nutrient){
    return { name: entry.nutrient.name||"", unit: entry.nutrient.unitName||"", value: (entry.amount!=null?entry.amount:entry.value) };
  }
  return { name: entry.nutrientName||"", unit: entry.unitName||"", value: entry.value };
}

function extractPer100g(foodDetail){
  var entries=foodDetail.foodNutrients||[];
  var raw=zeroN();
  var found={};

  var directMap=[
    {key:"protein",    match:["Protein"]},
    {key:"fat",        match:["Total lipid (fat)"]},
    {key:"calcium",    match:["Calcium, Ca"]},
    {key:"phosphorus", match:["Phosphorus, P"]},
    {key:"potassium",  match:["Potassium, K"]},
    {key:"sodium",     match:["Sodium, Na"]},
    {key:"chloride",   match:["Chloride, Cl","Chloride"]},
    {key:"magnesium",  match:["Magnesium, Mg"]},
    {key:"iron",       match:["Iron, Fe"]},
    {key:"copper",     match:["Copper, Cu"]},
    {key:"zinc",       match:["Zinc, Zn"]},
    {key:"selenium",   match:["Selenium, Se"]},
    {key:"vitK",       match:["Vitamin K (phylloquinone)"]},
    {key:"vitB1",      match:["Thiamin"]},
    {key:"vitB2",      match:["Riboflavin"]},
    {key:"vitB3",      match:["Niacin"]},
    {key:"vitB5",      match:["Pantothenic acid"]},
    {key:"vitB6",      match:["Vitamin B-6"]},
    {key:"vitB12",     match:["Vitamin B-12"]},
    {key:"folate",     match:["Folate, total"]},
    {key:"choline",    match:["Choline, total"]}
  ];

  for(var i=0;i<entries.length;i++){
    var f=getNutrientFields(entries[i]);
    if(!f.name || f.value==null) continue;

    for(var d=0;d<directMap.length;d++){
      if(found[directMap[d].key]) continue;
      for(var mi=0;mi<directMap[d].match.length;mi++){
        if(f.name===directMap[d].match[mi]){ raw[directMap[d].key]=f.value; found[directMap[d].key]=true; break; }
      }
    }

    if(!found.iodine && f.name==="Iodine, I"){ raw.iodine=f.value/1000; found.iodine=true; } // mcg -> mg

    if(!found.vitA && f.name==="Vitamin A, IU"){ raw.vitA=f.value; found.vitA=true; }
    if(!found.vitA && f.name==="Vitamin A, RAE"){ raw.vitA=f.value*3.33; }

    if(!found.vitD && f.name.indexOf("Vitamin D")===0){
      if(f.unit==="IU"){ raw.vitD=f.value; found.vitD=true; }
      else { raw.vitD=f.value*40; found.vitD=true; } // mcg -> IU
    }

    if(!found.vitE && f.name==="Vitamin E (alpha-tocopherol)"){ raw.vitE=f.value*1.49; found.vitE=true; } // mg -> IU approx

    if(/18:3|20:5|22:6/.test(f.name) && /n-3/i.test(f.name)){
      var mg3=(f.unit==="G")?f.value*1000:f.value;
      raw.omega3=(raw.omega3||0)+mg3;
    }
    if(/18:2|20:4/.test(f.name) && /n-6/i.test(f.name)){
      var mg6=(f.unit==="G")?f.value*1000:f.value;
      raw.omega6=(raw.omega6||0)+mg6;
    }
  }
  return raw;
}

function per100gToPerOz(per100){
  var ozFactor=28.3495/100;
  var perOz={};
  for(var k=0;k<KEYS.length;k++) perOz[KEYS[k]]=+(((per100[KEYS[k]]||0))*ozFactor).toFixed(4);
  return perOz;
}

// ── HISTORY (embedded under Calendar tab) ───────────────────────────────────
function setHistView(v){ histView=v; renderCalendarPage(); }

function setHistMode(checked){ histMode = checked ? "actual" : "scheduled"; renderCalendarPage(); }

function navHistory(dir){
  if(histView==="day"){
    var nd1=addDays(histYear,histMonth,histDay,dir);
    histYear=nd1.y; histMonth=nd1.m; histDay=nd1.d;
  } else if(histView==="week"){
    var nd=addDays(histYear,histMonth,histDay,dir*7);
    histYear=nd.y; histMonth=nd.m; histDay=nd.d;
  } else if(histView==="month"){
    var dt=new Date(histYear,histMonth+dir,1);
    histYear=dt.getFullYear(); histMonth=dt.getMonth();
  } else {
    histYear+=dir;
  }
  renderCalendarPage();
}

function jumpToMonth(y,m){ histYear=y; histMonth=m; histView="month"; renderCalendarPage(); }

function buildHistoryHtml(){
  var views=["day","week","month","year"];
  var toggle='<div class="view-toggle">';
  for(var i=0;i<views.length;i++){
    var v=views[i];
    var lbl=v==="day"?"Day":v==="week"?"Week":v==="month"?"Month":"Year";
    toggle+='<button class="view-btn'+(histView===v?" active":"")+'" onclick="setHistView(\''+v+'\')">'+lbl+'</button>';
  }
  toggle+='</div>';

  var checkbox='<label class="actual-toggle"><input type="checkbox" id="actualChk" onchange="setHistMode(this.checked)"'
    +(histMode==="actual"?" checked":"")+'> Show actual fed meals (hide scheduled)</label>';

  var navLabel="";
  if(histView==="day"){
    navLabel=fmtDate(histYear,histMonth,histDay);
  } else if(histView==="week"){
    var st=startOfWeek(histYear,histMonth,histDay);
    var en=addDays(st.y,st.m,st.d,6);
    navLabel=monthAbbrev(st.m)+" "+st.d+" &ndash; "+monthAbbrev(en.m)+" "+en.d+(en.y!==st.y?", "+en.y:"");
  } else if(histView==="month"){
    navLabel=monthAbbrev(histMonth)+" "+histYear;
  } else {
    navLabel=String(histYear);
  }

  var nav='<div class="hist-nav-row">'
    +'<button class="nav-btn" onclick="navHistory(-1)">&#8249;</button>'
    +'<div class="hist-period-label">'+navLabel+'</div>'
    +'<button class="nav-btn" onclick="navHistory(1)">&#8250;</button>'
    +'</div>';

  var content="";
  if(histView==="day")   content=buildDayView();
  if(histView==="week")  content=buildWeekView();
  if(histView==="month") content=buildMonthView();
  if(histView==="year")  content=buildYearView();

  return toggle+checkbox+nav+content;
}

function buildAddlItemsLine(ds,slot,prefix){
  var addins=addinsLog[ds+"_"+slot]||{};
  var items=Object.keys(addins).filter(function(k){return addins[k]>0;});
  if(items.length===0) return "";
  var parts=[];
  for(var i=0;i<items.length;i++) parts.push(items[i]+" "+addins[items[i]]+"oz");
  return '<div class="week-addl-line">&#127857; '+(prefix?prefix+": ":"")+parts.join(", ")+'</div>';
}

function buildDayView(){
  var ds=dateKey(histYear,histMonth,histDay);
  var dow=getDOW(histYear,histMonth,histDay);
  var dn=DAYS_OF_WEEK[dow];
  var wk=getWK(histYear,histMonth,histDay);
  var dm=(WEEKS[wk]||{})[dn]||{};
  var amFed=!!fedLog[ds+"_am"], pmFed=!!fedLog[ds+"_pm"];
  var note=notesLog[ds]||"";

  var html='<div class="day-view-card">';

  // AM
  var amEff=getEffectiveMeal(ds,"am",dm.am);
  html+='<div class="day-detail-meal"><div class="dd-label">AM'+(amFed?" &#10003; Fed":" &mdash; not fed")+'</div>';
  if(!dm.am){
    html+='<div class="dd-detail">No meal scheduled</div>';
  } else if(histMode==="actual" && !amFed){
    html+='<div class="dd-detail">Not fed</div>';
  } else {
    var amShown=(histMode==="actual")?amEff:dm.am;
    if(histMode==="actual" && getProteinOverride(ds,"am")) html+='<div class="swap-note">&#8646; swapped from '+dm.am.protein+'</div>';
    html+='<div class="dd-protein">'+amShown.protein+'</div><div class="dd-detail">'+amShown.starch+' &middot; '+amShown.veg+(amShown.organ?' &middot; '+amShown.organ:'')+'</div>';
  }
  html+=buildAddlItemsLine(ds,"am");
  html+='</div>';

  // PM
  var pmEff=getEffectiveMeal(ds,"pm",dm.pm);
  html+='<div class="day-detail-meal"><div class="dd-label">PM'+(pmFed?" &#10003; Fed":" &mdash; not fed")+'</div>';
  if(!dm.pm){
    html+='<div class="dd-detail">No meal scheduled</div>';
  } else if(histMode==="actual" && !pmFed){
    html+='<div class="dd-detail">Not fed</div>';
  } else {
    var pmShown=(histMode==="actual")?pmEff:dm.pm;
    if(histMode==="actual" && getProteinOverride(ds,"pm")) html+='<div class="swap-note">&#8646; swapped from '+dm.pm.protein+'</div>';
    html+='<div class="dd-protein">'+pmShown.protein+'</div><div class="dd-detail">'+pmShown.starch+' &middot; '+pmShown.veg+(pmShown.organ?' &middot; '+pmShown.organ:'')+'</div>';
  }
  html+=buildAddlItemsLine(ds,"pm");
  html+='</div>';

  // Note (inline editable)
  html+='<div class="guide-section">Notes</div>'
    +'<textarea id="dayViewNote" class="note-textarea" placeholder="Add a note for this day...">'+escapeHtml(note)+'</textarea>'
    +'<button class="save-btn" onclick="saveDayViewNote(\''+ds+'\')">Save Note</button>';

  html+='</div>';
  return html;

function buildWeekView(){
  var st=startOfWeek(histYear,histMonth,histDay);
  var html="";
  for(var i=0;i<7;i++){
    var dt=addDays(st.y,st.m,st.d,i);
    var ds=dateKey(dt.y,dt.m,dt.d);
    var dow=getDOW(dt.y,dt.m,dt.d);
    var dn=DAYS_OF_WEEK[dow];
    var wk=getWK(dt.y,dt.m,dt.d);
    var dm=(WEEKS[wk]||{})[dn]||{};
    var amFed=!!fedLog[ds+"_am"];
    var pmFed=!!fedLog[ds+"_pm"];
    var note=notesLog[ds]||"";
    var isToday=(dt.y===today.getFullYear()&&dt.m===today.getMonth()&&dt.d===today.getDate());
    var notePreview = note ? ("&#128221; "+escapeHtml(note.length>70?note.slice(0,70)+"…":note)) : "+ Add note";

    var amText, pmText;
    if(histMode==="actual"){
      var amEff=getEffectiveMeal(ds,"am",dm.am);
      var pmEff=getEffectiveMeal(ds,"pm",dm.pm);
      amText = amFed ? ("&#10003; AM: "+(amEff?amEff.protein:"&mdash;")) : "AM: Not fed";
      pmText = pmFed ? ("&#10003; PM: "+(pmEff?pmEff.protein:"&mdash;")) : "PM: Not fed";
    } else {
      amText = (amFed?"&#10003; ":"")+"AM: "+(dm.am?dm.am.protein:"&mdash;");
      pmText = (pmFed?"&#10003; ":"")+"PM: "+(dm.pm?dm.pm.protein:"&mdash;");
    }

    html+='<div class="week-day-row'+(isToday?" today":"")+'">'
      +'<div class="week-day-name">'+dn+' &middot; '+monthAbbrev(dt.m)+' '+dt.d+'</div>'
      +'<div class="week-meals">'
      +'<div class="week-meal-pill'+(amFed?" fed":"")+'">'+amText+'</div>'
      +'<div class="week-meal-pill'+(pmFed?" fed":"")+'">'+pmText+'</div>'
      +'</div>'
      +buildAddlItemsLine(ds,"am","AM")
      +buildAddlItemsLine(ds,"pm","PM")
      +'<div class="week-note" onclick="openDayDetail(\''+ds+'\')">'+notePreview+'</div>'
      +'</div>';
  }
  return html;
}

function buildMonthView(){
  var y=histYear, m=histMonth;
  var firstDow=getDOW(y,m,1);
  var daysInMonth=new Date(y,m+1,0).getDate();

  var html='<div class="month-weekdays">';
  var wd=["S","M","T","W","T","F","S"];
  for(var i=0;i<7;i++) html+='<div class="month-weekday-cell">'+wd[i]+'</div>';
  html+='</div><div class="month-grid">';

  for(var i=0;i<firstDow;i++) html+='<div class="month-cell empty"></div>';

  for(var d=1; d<=daysInMonth; d++){
    var ds=dateKey(y,m,d);
    var amFed=!!fedLog[ds+"_am"];
    var pmFed=!!fedLog[ds+"_pm"];
    var hasNote=!!notesLog[ds];
    var isToday=(y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate());
    var fc=(amFed?1:0)+(pmFed?1:0);
    var cls="month-cell"+(isToday?" today":"")+(fc===2?" full-fed":fc===1?" half-fed":"");
    html+='<div class="'+cls+'" onclick="openDayDetail(\''+ds+'\')">'
      +'<div class="month-cell-day">'+d+'</div>'
      +'<div class="month-cell-dots"><span class="m-dot'+(amFed?" on":"")+'"></span><span class="m-dot'+(pmFed?" on":"")+'"></span></div>'
      +(hasNote?'<div class="note-dot"></div>':'')
      +'</div>';
  }
  html+='</div>';
  return html;
}

function buildYearView(){
  var y=histYear;
  var html='<div class="year-grid">';
  for(var m=0;m<12;m++){
    var daysInMonth=new Date(y,m+1,0).getDate();
    var firstDow=getDOW(y,m,1);
    html+='<div class="mini-month" onclick="jumpToMonth('+y+','+m+')">'
      +'<div class="mini-month-label">'+monthAbbrev(m)+'</div>'
      +'<div class="mini-grid">';
    for(var i=0;i<firstDow;i++) html+='<span class="mini-cell empty"></span>';
    for(var d=1; d<=daysInMonth; d++){
      var ds=dateKey(y,m,d);
      var amFed=!!fedLog[ds+"_am"];
      var pmFed=!!fedLog[ds+"_pm"];
      var fc=(amFed?1:0)+(pmFed?1:0);
      var cls="mini-cell"+(fc===2?" full":fc===1?" half":"");
      html+='<span class="'+cls+'"></span>';
    }
    html+='</div></div>';
  }
  html+='</div>';
  return html;
}

function openDayDetail(ds){
  var parts=ds.split("-");
  var y=parseInt(parts[0],10), m=parseInt(parts[1],10), d=parseInt(parts[2],10);
  var dow=getDOW(y,m,d), wk=getWK(y,m,d), dn=DAYS_OF_WEEK[dow];
  var dm=(WEEKS[wk]||{})[dn]||{};
  var amFed=!!fedLog[ds+"_am"], pmFed=!!fedLog[ds+"_pm"];
  var note=notesLog[ds]||"";
  var label=fmtDate(y,m,d);

  var html='<div class="overlay" id="ddbg"><div class="modal">'
    +'<div class="modal-head"><div class="modal-title">'+label+'</div>'
    +'<button class="modal-close" onclick="closeDayDetail()">&#10005;</button></div>';

  // AM block — in "actual" mode, hide scheduled details unless it was actually fed, and show the swap if any
  var amDetail;
  var amEff=getEffectiveMeal(ds,"am",dm.am);
  if(!dm.am){
    amDetail='<div class="dd-detail">No meal scheduled</div>';
  } else if(histMode==="actual" && !amFed){
    amDetail='<div class="dd-detail">Not fed</div>';
  } else {
    var amShown=(histMode==="actual")?amEff:dm.am;
    var amSwapNote=(histMode==="actual" && getProteinOverride(ds,"am")) ? '<div class="swap-note">&#8646; swapped from '+dm.am.protein+'</div>' : '';
    amDetail='<div class="dd-protein">'+amShown.protein+'</div>'+amSwapNote+'<div class="dd-detail">'+amShown.starch+' &middot; '+amShown.veg+(amShown.organ?' &middot; '+amShown.organ:'')+'</div>';
  }
  html+='<div class="day-detail-meal"><div class="dd-label">AM'+(amFed?" &#10003; Fed":" &mdash; not fed")+'</div>'+amDetail+'</div>';

  // PM block — same logic
  var pmDetail;
  var pmEff=getEffectiveMeal(ds,"pm",dm.pm);
  if(!dm.pm){
    pmDetail='<div class="dd-detail">No meal scheduled</div>';
  } else if(histMode==="actual" && !pmFed){
    pmDetail='<div class="dd-detail">Not fed</div>';
  } else {
    var pmShown=(histMode==="actual")?pmEff:dm.pm;
    var pmSwapNote=(histMode==="actual" && getProteinOverride(ds,"pm")) ? '<div class="swap-note">&#8646; swapped from '+dm.pm.protein+'</div>' : '';
    pmDetail='<div class="dd-protein">'+pmShown.protein+'</div>'+pmSwapNote+'<div class="dd-detail">'+pmShown.starch+' &middot; '+pmShown.veg+(pmShown.organ?' &middot; '+pmShown.organ:'')+'</div>';
  }
  html+='<div class="day-detail-meal"><div class="dd-label">PM'+(pmFed?" &#10003; Fed":" &mdash; not fed")+'</div>'+pmDetail+'</div>';

  html+='<div class="modal-hint" style="margin-top:10px">Notes</div>'
    +'<textarea id="noteInput" class="note-textarea" placeholder="Add a note for this day...">'+escapeHtml(note)+'</textarea>'
    +'<button class="save-btn" onclick="saveDayNote(\''+ds+'\')">Save Note</button>';

  html+='</div></div>';

  document.getElementById("modal-root").innerHTML=html;
  document.getElementById("ddbg").addEventListener("click",function(e){ if(e.target===this) closeDayDetail(); });
}

function closeDayDetail(){ document.getElementById("modal-root").innerHTML=""; }

function saveDayNote(ds){
  var el=document.getElementById("noteInput");
  var v=el?el.value.trim():"";
  if(v) notesLog[ds]=v; else delete notesLog[ds];
  try{localStorage.setItem("mya_notes",JSON.stringify(notesLog));}catch(e){}
  closeDayDetail();
  renderCalendarPage();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
document.getElementById("petNameInput").value=petName;
updateHeaderSub();
renderGuide();
</script>
</body>
